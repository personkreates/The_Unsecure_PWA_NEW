{% extends 'layout.html' %}
{% block content %}
<h1>Welcome <strong>{{ value }}</strong>!</h1>

<!-- Error message -->
{% if error %}
<div>{{ error }}</div>
{% endif %}

<form action="{{ url_for('add_feedback') }}" method="post" class="box">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="input__wrapper">
    <input style="height:100px;vertical-align:top" type="text" name="feedback" id="feedback" placeholder="Enter your feedback here" class="input__field" required/>
  </div>
  <div class="input__wrapper">
    <input
      type="submit"
      class="btn"
      value="Submit Feedback"
      minlength="8"
      maxlength="256"
    />
  </div>
</form>
<hr/>
  <br/>
  <h1>Others feedback</h1>
      <div>
        {% if feedback %}
          {% for f in feedback %}
            <p>{{ f[1] }}</p>
          {% endfor %}
        {% endif %}
      </div>
{% endblock %}
